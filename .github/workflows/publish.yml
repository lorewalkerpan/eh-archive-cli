name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      # npm Trusted Publishing requires npm 11.5.1 or newer for OIDC support.
      - run: npm install --global npm@^11.5.1
      - run: node --version && npm --version
      - run: npm ci
      - run: npm test
      - name: Verify package version matches the Release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node --input-type=module -e 'import { readFileSync } from "node:fs"; const { version } = JSON.parse(readFileSync("package.json", "utf8")); if (`v${version}` !== process.env.RELEASE_TAG) throw new Error(`Release ${process.env.RELEASE_TAG} does not match package version ${version}`);'
      - run: npm publish --access public
